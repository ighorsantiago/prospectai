<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fundo -->
  <rect width="1200" height="630" fill="#0F1117"/>

  <!-- Gradiente roxo sutil no canto superior direito -->
  <radialGradient id="glow" cx="80%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Borda sutil -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" rx="0"/>

  <!-- Ícone (relâmpago) -->
  <rect x="80" y="200" width="72" height="72" rx="16" fill="#7C3AED"/>
  <text x="116" y="248" font-family="sans-serif" font-size="38" text-anchor="middle" fill="white">⚡</text>

  <!-- Título -->
  <text x="80" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#F4F4F5">ProspectAI</text>

  <!-- Subtítulo -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" fill="#A1A1AA">Mapeie negócios e gere scripts de vendas com IA</text>

  <!-- Pill Sant.IA.Go -->
  <rect x="80" y="440" width="180" height="40" rx="20" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="170" y="466" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#8B5CF6" text-anchor="middle">Sant.IA.Go</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#52525B" text-anchor="end">prospectai-zeta.vercel.app</text>
</svg>
