<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo roxo com bordas arredondadas -->
  <rect width="32" height="32" rx="8" fill="#7C3AED"/>
  <!-- Sparkles icon (lucide) centrado e em branco -->
  <g transform="translate(6, 6) scale(0.833)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Estrela grande (centro) -->
    <path d="M12 3 L13.5 8.5 L19 10 L13.5 11.5 L12 17 L10.5 11.5 L5 10 L10.5 8.5 Z"/>
    <!-- Estrela pequena (superior direita) -->
    <path d="M19 3 L19.75 5.25 L22 6 L19.75 6.75 L19 9 L18.25 6.75 L16 6 L18.25 5.25 Z"/>
    <!-- Estrela pequena (inferior esquerda) -->
    <path d="M5 17 L5.75 19.25 L8 20 L5.75 20.75 L5 23 L4.25 20.75 L2 20 L4.25 19.25 Z"/>
  </g>
</svg>
